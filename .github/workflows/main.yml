name: Build FNF Psych Engine for HTML5

on:
  push:
    branches: [ main, experimental ]
  pull_request:
    branches: [ main, experimental ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.1.7

      - name: Install Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.4

      - name: Give Execute Permission to Setup Script
        run: chmod +x setup.sh

      - name: Run Setup Script
        run: ./setup.sh

      - name: Compile to HTML5
        run: haxelib run lime build html5 -D officialBuild -D HXCPP_NO_THREADS

      - name: Upload HTML5 Build
        uses: actions/upload-artifact@v4.3.4
        with:
          name: fnf-html5-build
          path: export/release/html5/bin
