name: Build Psych Engine 0.6.3 for HTML5

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install Haxe 4.2.5
      run: |
        wget -q https://github.com/HaxeFoundation/haxe/releases/download/4.2.5/haxe-4.2.5-linux64.tar.gz
        tar -xf haxe-4.2.5-linux64.tar.gz
        EXTRACTED_FOLDER=$(tar -tzf haxe-4.2.5-linux64.tar.gz | head -1 | cut -f1 -d"/")
        sudo mv "$EXTRACTED_FOLDER" /usr/local/haxe
        echo "export PATH=/usr/local/haxe/bin:$PATH" >> $HOME/.bashrc
        echo "export PATH=/usr/local/haxe/bin:$PATH" >> $HOME/.profile
        export PATH=/usr/local/haxe/bin:$PATH
        haxe --version  # Verify installation

    - name: Set up Haxelib
      run: |
        mkdir -p ~/haxelib
        haxelib setup ~/haxelib

    - name: Install dependencies
      run: |
        haxelib install flixel 5.6.1
        haxelib install flixel-addons 3.2.2
        haxelib install flixel-tools 1.5.1
        haxelib install hscript-iris 1.1.3
        haxelib install tjson 1.4.0
        haxelib install hxdiscord_rpc 1.2.4
        haxelib install hxvlc 2.0.1 --skip-dependencies
        haxelib install lime 8.1.2
        haxelib install openfl 9.3.3
        haxelib git flxanimate https://github.com/Dot-Stuff/flxanimate 768740a56b26aa0c072720e0d1236b94afe68e3e
        haxelib git funkin.vis https://github.com/FunkinCrew/funkVis 22b1ce089dd924f15cdc4632397ef3504d464e90
        haxelib git grig.audio https://gitlab.com/haxe-grig/grig.audio.git cbf91e2180fd2e374924fe74844086aab7891666

    - name: Compile for HTML5 (without Lua)
      run: lime build html5 -D NO_LUA
