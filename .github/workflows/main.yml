name: Build Psych Engine to HTML5

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Haxe
        run: |
          sudo apt-get update
          sudo apt-get install -y haxe
          haxelib setup ~/haxelib

      - name: Run setup script
        run: |
          chmod +x setup.sh
          ./setup.sh

      - name: Compile to HTML5
        run: |
          lime test html5
